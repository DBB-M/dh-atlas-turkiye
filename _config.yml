##########
# SITE SETTINGS
##########

# URL of your CollectionBuilder site
url: https://dbb-m.github.io
# baseurl is the subpath of your site, e.g. /dh-atlas-turkiye
baseurl: /dh-atlas-turkiye

# Title of the site
title: DH Atlas Türkiye
# Tagline — Türkçe karakter kullanma, sorun çıkarabilir
tagline: Türkiye ve Türkiye Çalışmaları Dijital Beşeri ve Sosyal Bilimler Haritasi
# Short description
description: Türkiye merkezli dijital beşeri ve sosyal bilimler projelerinin kataloğu.

# Github username
github-username: dbb-m

##########
# COLLECTION SETTINGS
##########

# metadata CSV dosya adı — _data/ klasöründeki dosya adıyla birebir aynı olmalı (.csv olmadan)
metadata: DBB_Atlas_CB_ready

##########
# MAP SETTINGS
##########

# Harita başlangıç koordinatları (Türkiye merkezi)
latitude: 39.0
longitude: 35.0
zoom: 5

# Koordinat sütunları
latitude-field: latitude
longitude-field: longitude

##########
# ITEM PAGE SETTINGS
##########

# Hangi alan başlık olarak kullanılacak
title-field: title
# Hangi alan tarih olarak kullanılacak
date-field: date
# Hangi alan açıklama olarak kullanılacak
description-field: description
# Hangi alan konu olarak kullanılacak
subject-field: subjects
# Hangi alan konum olarak kullanılacak
location-field: ulke_kurum
# Hangi alan tür olarak kullanılacak
object-type-field: format

##########
# BROWSE SETTINGS
##########

# Browse sayfasında görünecek alanlar (virgülle ayrılmış)
browse-buttons: format;alan;erisim

##########
# JEKYLL SETTINGS
##########

# Bu satırları değiştirme
permalink: /items/:name.html
sass:
  style: compressed
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - README.md
  - rakelib/
  - docs/
  - node_modules/
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - CITATION.cff
  - LICENSE
  - SECURITY.md
  - Rakefile
